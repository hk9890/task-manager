version: 2
updates:
  # Go modules — one entry per module in this multi-module repo.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns: ["*"]
  - package-ecosystem: gomod
    directory: "/sdk"
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns: ["*"]
  - package-ecosystem: gomod
    directory: "/bench"
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns: ["*"]

  # Keep the GitHub Actions (pinned to SHAs) up to date.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
