name: Release

on:
  push:
    tags:
      - 'v[0-9]*'          # CLI release tags only — `sdk/*` module tags never trigger this
  pull_request:
    paths:                 # validate the release config on PRs that touch it (snapshot, no publish)
      - '.goreleaser.yaml'
      - '.github/workflows/release.yml'

# Default every job to read-only. Only the publish job below elevates to write,
# so the PR/snapshot path carries no write-capable token even while it builds PR
# code (GitHub does not allow expressions in `permissions:`, hence two jobs).
permissions:
  contents: read

jobs:
  # Tag push -> real cross-platform build + (draft) GitHub release.
  release:
    name: GoReleaser (release)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create the GitHub release and upload assets
      id-token: write      # keyless cosign signing via Sigstore OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0   # GoReleaser needs full history + tags for the changelog

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin the tag so the parallel `sdk/v*` tag on the same commit is never picked up.
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

  # PR touching the release config -> snapshot build only (no publish, read-only
  # token). Catches a broken .goreleaser.yaml before any tag is ever cut.
  validate:
    name: GoReleaser (snapshot)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser (snapshot)
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: "~> v2"
          # Snapshot validation has no cosign/syft installed, so skip those steps.
          args: release --snapshot --clean --skip=sign,sbom
